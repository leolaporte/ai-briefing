rss:
  opml_file: "~/Sync/beatcheck.opml"
  feeds: []
  # Aggregator feeds report their own posting time as <pubDate>, not
  # the linked article's real publish date. For these sources we fetch
  # the article and read Open Graph article:published_time / JSON-LD
  # datePublished. Stories whose real date can't be determined are
  # dropped rather than trusted.
  aggregator_sources:
    - "Hacker News"
    - "MetaFilter"
    - "Pinboard"
    - "Lobsters"
    - "Slashdot"
    - "Reddit"

claude:
  model: "claude-haiku-4-5"
  max_tokens: 4096
  few_shot_k: 20

pipeline:
  window_hours: 24
  cluster_threshold: 0.5
  top_n_per_show: 15
  other_threshold: 0.3

storage:
  archive_db: "~/.local/share/ai-briefing/archive.db"
  labels_db: "~/.local/share/ai-briefing/labels.db"

archive:
  # Root directory containing archive-twit/ archive-mbw/ archive-im/ folders of
  # final show rundowns (.html, .org, and -LINKS.csv files).
  root: "~/Documents"

output:
  path: "~/Obsidian/lgl/AI/News"
